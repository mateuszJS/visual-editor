name: Unit Tests
on:
  pull_request:
    branches:
      - develop

env:
  # All below values are mandatory during the build, but real value need to be used while running
  # so build can succedd with dummy values
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: x
  SESSION_SECRET: x
  PRIVATE_SUPABASE_ANON_KEY: x
  SUPABASE_URL: http://valid-url
  GOOGLE_STORAGE_PROJECT_ID: x
  GOOGLE_STORAGE_EMAIL: x
  GOOGLE_STORAGE_PRIVATE_KEY: x

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run_unit_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - run: npm ci
      - run: npm run build
      - run: npm audit signatures
      - run: npm run build-storybook

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Storybook to Vercel
        id: deploy
        run: |
          # Deploy storybook-static directory to Vercel
          DEPLOYMENT_URL=$(vercel deploy storybook-static --token=${{ secrets.VERCEL_TOKEN }} --yes --target=preview)
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed Storybook to: $DEPLOYMENT_URL"

      - name: Run unit tests for Frontend, Backend and Visual Regression
        run: npm test && npm run cf-test
      - name: Visual Regression tests - Upload diff images to branch
        if: always()
        run: |
          # Setup git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Create a branch named after the PR number
          PR_NUMBER="${{ github.event.number }}"
          BRANCH_NAME="visual-diffs-pr-${PR_NUMBER}"
          echo "DIFFS_BRANCH=${BRANCH_NAME}" >> $GITHUB_ENV

          # Make sure we have the latest code
          git fetch origin

          # Check if branch already exists, force update it
          if git ls-remote --heads origin ${BRANCH_NAME} | grep ${BRANCH_NAME}; then
            git checkout -b ${BRANCH_NAME} origin/${BRANCH_NAME} || git checkout -b ${BRANCH_NAME}
            git reset --hard HEAD
          else
            git checkout -b ${BRANCH_NAME}
          fi

          # Create diffs directory and make sure it's empty
          DIFFS_DIR=".github/visual-diffs"
          mkdir -p $DIFFS_DIR
          rm -rf $DIFFS_DIR/*

          # Copy diff images
          find src -path "*/__diff_output__/*.png" -exec cp {} $DIFFS_DIR/ \;

          git add $DIFFS_DIR

          # Check if git detected any changes
          if git diff --staged --quiet; then
            echo "No new diff images found"
          else
            git commit -m "Update visual test diffs for PR #${PR_NUMBER} (Run #${{ github.run_id }})"
            git push -f origin ${BRANCH_NAME}
            echo "✅ Successfully pushed new diff images to branch"
          fi

          # Check if the diff directory has any files
          if [ -n "$(ls -A $DIFFS_DIR 2>/dev/null)" ]; then
            echo "IS_ANY_DIFF=true" >> $GITHUB_ENV
            echo "Diff images found"
          else
            echo "IS_ANY_DIFF=false" >> $GITHUB_ENV
            echo "No diff images found"
          fi

      - name: Comment on PR with failure details
        if: always()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const issue_number = context.issue.number;
            const branchName = process.env.DIFFS_BRANCH;
            const commentTitle = '## Visual Test Failures';
            const deployUrl = '${{ steps.deploy.outputs.deployment_url }}';

            // 1. Find existing visual test comments
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number
            });

            const visualTestComments = comments.data.filter(comment => 
              comment.body.includes(commentTitle)
            );

            // 2. Delete previous comments
            for (const comment of visualTestComments) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: comment.id
              });
              console.log(`Deleted previous visual test comment: ${comment.id}`);
            }

            // 3. Post new comment only if we have diffs
            if (process.env.IS_ANY_DIFF === 'false') {
              console.log('No visual diffs found');
              return;
            }

            const diffDir = '.github/visual-diffs';
            const diffFiles = fs.readdirSync(diffDir).filter(file => file.endsWith('.png'));

            if (diffFiles.length === 0) {
              // It means that previous diffs were removed, that's why branchName exists!
              // Files deletion was pushed!
              console.log('No image files found in diff directory');
              return;
            }

            let commentBody = `${commentTitle}\n\nYour Storybook has been deployed to a preview environment:\n[${deployUrl}](${deployUrl})\n\nFound ${diffFiles.length} visual differences:\n\n`;

            // Add each image to the comment
            diffFiles.forEach(file => {
              const storybookId = file.split('-diff.png')[0];
              const imageUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branchName}/${diffDir}/${file}`;
              commentBody += `### ${storybookId}\n![${file}](${imageUrl})\n\n`;
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: commentBody
            });
