name: Pull Request Test
on:
  push:
    branches-ignore:
      - develop
      - production

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check_pr:
    runs-on: ubuntu-latest
    outputs:
      has_pr: ${{ steps.check.outputs.has_pr }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for PR to develop
        id: check
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "Current branch: $BRANCH_NAME"

          # Use GitHub API directly instead of gh CLI
          PR_URL="https://api.github.com/repos/$GITHUB_REPOSITORY/pulls?head=${GITHUB_REPOSITORY_OWNER}:${BRANCH_NAME}&base=develop&state=open"
          echo "Checking PR URL: $PR_URL"

          PR_COUNT=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$PR_URL" | jq length)
          echo "Found $PR_COUNT PRs"

          if [[ "$PR_COUNT" -gt 0 ]]; then
            echo "has_pr=true" >> $GITHUB_OUTPUT
            echo "✅ PR to develop exists"
          else
            echo "has_pr=false" >> $GITHUB_OUTPUT
            echo "❌ No PR to develop found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test_branch:
    needs: check_pr
    if: needs.check_pr.outputs.has_pr == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci
      - run: npm run build
      - run: npm audit signatures
      - name: Run unit tests
        run: npm test
      - name: Run visual tests
        run: npm run test-visual

      - name: Upload snapshots and diffs
        if: always() # Run even if tests fail
        uses: actions/upload-artifact@v3
        with:
          name: visual-test-results
          path: |
            src/**/__diff_output__/
          retention-days: 2

      - name: Find PR number
        if: failure() && github.event_name == 'pull_request'
        id: pr
        run: echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Comment on PR with failure details
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const issue_number = process.env.PR_NUMBER;

            const diffFiles = glob.sync('src/**/__image_diff__/*.png');

            if (diffFiles.length > 0) {
              github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `## Visual Test Failures\n\nFound ${diffFiles.length} visual differences. [Download full report](${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId}).`
              });
            }
