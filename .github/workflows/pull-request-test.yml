name: Pull Request Test
on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check_pr:
    runs-on: ubuntu-latest
    outputs:
      has_pr: ${{ steps.check.outputs.has_pr }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for PR to develop
        id: check
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "Current branch: $BRANCH_NAME"

          # Use GitHub API directly instead of gh CLI
          PR_URL="https://api.github.com/repos/$GITHUB_REPOSITORY/pulls?head=${GITHUB_REPOSITORY_OWNER}:${BRANCH_NAME}&base=develop&state=open"
          echo "Checking PR URL: $PR_URL"

          PR_COUNT=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$PR_URL" | jq length)
          echo "Found $PR_COUNT PRs"

          if [[ "$PR_COUNT" -gt 0 ]]; then
            echo "has_pr=true" >> $GITHUB_OUTPUT
            echo "✅ PR to develop exists"
          else
            echo "has_pr=false" >> $GITHUB_OUTPUT
            echo "❌ No PR to develop found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test_branch:
    needs: check_pr
    if: needs.check_pr.outputs.has_pr == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci
      - run: npm run build
      - run: npm audit signatures
      - name: Run unit tests
        run: npm test
      - name: Run visual tests
        run: npm run test-visual

      - name: Upload snapshots and diffs
        if: always() # Run even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: src/**/__diff_output__/
          retention-days: 1

      - name: Upload diff images to branch
        if: always()
        run: |
          # Setup git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Create a branch named after the PR number
          PR_NUMBER="${{ github.event.number }}"
          BRANCH_NAME="visual-diffs-pr-${PR_NUMBER}"

          # Make sure we have the latest code
          git fetch origin

          # Check if branch already exists, force update it
          if git ls-remote --heads origin ${BRANCH_NAME} | grep ${BRANCH_NAME}; then
            git checkout -b ${BRANCH_NAME} origin/${BRANCH_NAME} || git checkout -b ${BRANCH_NAME}
            git reset --hard HEAD
          else
            git checkout -b ${BRANCH_NAME}
          fi

          # Create diffs directory and copy the images
          DIFFS_DIR=".github/visual-diffs"
          mkdir -p $DIFFS_DIR
          rm -rf $DIFFS_DIR/* # Clean previous images
          find src -path "*/__diff_output__/*.png" -exec cp {} $DIFFS_DIR/ \;

          # Commit and push if there are diffs
          if [ -n "$(ls -A $DIFFS_DIR)" ]; then
            git add $DIFFS_DIR
            git commit -m "Update visual test diffs for PR #${PR_NUMBER} (Run #${{ github.run_id }})"
            git push -f origin ${BRANCH_NAME}
            echo "DIFFS_BRANCH=${BRANCH_NAME}" >> $GITHUB_ENV
          else
            echo "No diff images found"
          fi

      - name: Comment on PR with failure details
        if: always()
        # if: env.DIFFS_BRANCH
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const issue_number = context.issue.number;
            const branchName = process.env.DIFFS_BRANCH;

            if (!branchName) {
              console.log('No visual diffs found');
              return;
            }

            const diffDir = '.github/visual-diffs';
            const diffFiles = fs.readdirSync(diffDir).filter(file => file.endsWith('.png'));

            let commentBody = `## Visual Test Failures\n\nFound ${diffFiles.length} visual differences:\n\n`;

            // Add each image to the comment
            diffFiles.forEach(file => {
              const imageUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branchName}/${diffDir}/${file}`;
              commentBody += `diffDir\n### ${file}\n![${file}](${imageUrl})\n\n`;
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: commentBody
            });
